<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Артём — лопни пузырьки</title>
    <meta
      name="description"
      content="Игра ко дню рождения Артёма: лопни пузырьки шампанского до 19 августа"
    />
    <meta name="theme-color" content="#0b1220" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="atmosphere" aria-hidden="true">
      <div class="glow glow-a"></div>
      <div class="glow glow-b"></div>
      <div class="grain"></div>
    </div>

    <canvas id="game" class="game-canvas" aria-label="Игровое поле с пузырьками"></canvas>

    <header class="topbar">
      <div class="brand-row">
        <p class="brand">Артём</p>
        <p class="eyebrow">до дня рождения · <span class="date">19 августа</span></p>
      </div>

      <div class="countdown" role="timer" aria-live="polite" aria-atomic="true">
        <div class="unit">
          <strong data-unit="days">0</strong>
          <span>д</span>
        </div>
        <span class="cd-sep" aria-hidden="true">:</span>
        <div class="unit">
          <strong data-unit="hours">00</strong>
          <span>ч</span>
        </div>
        <span class="cd-sep" aria-hidden="true">:</span>
        <div class="unit">
          <strong data-unit="minutes">00</strong>
          <span>м</span>
        </div>
        <span class="cd-sep" aria-hidden="true">:</span>
        <div class="unit">
          <strong data-unit="seconds">00</strong>
          <span>с</span>
        </div>
      </div>
      <p class="arrived" id="arrived" hidden>С днём рождения!</p>
    </header>

    <aside class="hud" id="hud" hidden>
      <div class="hud-stat">
        <span class="hud-label">счёт</span>
        <span class="hud-value" id="score">0</span>
      </div>
      <div class="hud-stat">
        <span class="hud-label">комбо</span>
        <span class="hud-value" id="combo">×1</span>
      </div>
      <div class="hud-stat">
        <span class="hud-label">время</span>
        <span class="hud-value" id="time">45</span>
      </div>
      <div class="toast-track" aria-hidden="true">
        <div class="toast-fill" id="toastFill"></div>
      </div>
    </aside>

    <div class="float-score" id="floatScore" aria-hidden="true"></div>

    <section class="sheet" id="startPanel">
      <div class="sheet-handle" aria-hidden="true"></div>
      <h1 class="sheet-title">Лопни пузырьки</h1>
      <p class="sheet-text">Тапай пузырьки, копи комбо, подними тост.</p>

      <label class="field" for="playerName">
        <span class="field-label">Твоё имя</span>
        <input
          id="playerName"
          name="playerName"
          type="text"
          maxlength="16"
          placeholder="друг Артёма"
          autocomplete="nickname"
          enterkeyhint="done"
        />
      </label>

      <button type="button" class="cta" id="startBtn">Играть · 45 сек</button>

      <div class="board-wrap" id="boardWrap">
        <p class="board-title">Рекорды</p>
        <ol class="board" id="board" aria-label="Таблица рекордов"></ol>
      </div>
    </section>

    <section class="sheet sheet-end" id="endPanel" hidden>
      <div class="sheet-handle" aria-hidden="true"></div>
      <h2 class="sheet-title" id="endTitle">Тост готов!</h2>
      <p class="end-score">
        <span id="endScore">0</span>
        <small>очков</small>
      </p>
      <p class="sheet-text" id="endText">Отличный залп. Друзья, ваш ход.</p>
      <button type="button" class="cta" id="againBtn">Ещё раунд</button>
      <button type="button" class="cta cta-ghost" id="menuBtn">К таблице</button>
    </section>

    <p class="hint" id="hint" hidden>Тапай пузырьки</p>

    <script src="script.js"></script>
  </body>
</html>
